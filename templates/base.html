<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}日文小说 · 阅读站{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body class="light">
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="logo">
      <span class="logo-red">日文</span><span class="logo-gray">小说</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">首页</a>
      <a href="/?order=hyoka" class="nav-link">排行榜</a>
      <a href="/?order=favnovelcnt" class="nav-link">热门收藏</a>
      <a href="/?order=new" class="nav-link">最新更新</a>
    </div>
    <button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="footer">
  <div class="footer-inner">
    <p>内容来源：<a href="https://syosetu.com" target="_blank" rel="noopener">小説家になろう</a>（合法公开平台）</p>
    <p>本站仅供日语学习与交流，版权归原作者所有</p>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
