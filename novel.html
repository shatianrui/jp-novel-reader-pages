<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说详情 · 日文小说</title>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet"></noscript>
</head>
<body class="light">
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-red">日文</span><span class="logo-gray">小说</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">首页</a>
        <a href="bookshelf.html" class="nav-link">书架</a>
        <a href="index.html?order=hyoka" class="nav-link">排行榜</a>
        <a href="index.html?order=favnovelcnt" class="nav-link">热门收藏</a>
        <a href="index.html?order=new" class="nav-link">最新更新</a>
      </div>
      <button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
    </div>
  </nav>

  <main>
    <div class="container novel-detail">
      <a href="index.html" class="back-link">← 返回首页</a>

      <div class="loading" id="detailLoading">
        <div class="spinner"></div>
        <p>正在加载小说信息…</p>
      </div>

      <div class="reader-error" id="detailError" style="display:none">
        <p id="detailErrorMessage">⚠️ 小说信息加载失败</p>
      </div>

      <div id="detailContent" style="display:none">
        <div class="novel-hero">
          <div class="novel-cover-placeholder">
            <span class="cover-icon" id="coverIcon">📖</span>
          </div>
          <div class="novel-info">
            <div class="novel-badges" id="novelBadges"></div>
            <h1 class="novel-title-jp" id="novelTitle"></h1>
            <p class="novel-author">作者：<strong id="novelWriter"></strong></p>
            <div class="novel-stats">
              <div class="stat-item">
                <span class="stat-icon">⭐</span>
                <span class="stat-val" id="favCount">0</span>
                <span class="stat-label">收藏</span>
              </div>
              <div class="stat-item">
                <span class="stat-icon">🏆</span>
                <span class="stat-val" id="scoreCount">0</span>
                <span class="stat-label">评分</span>
              </div>
              <div class="stat-item">
                <span class="stat-icon">📝</span>
                <span class="stat-val" id="lengthLabel">0字</span>
                <span class="stat-label">字数</span>
              </div>
            </div>
            <div class="tags-wrap" id="tagList" style="display:none"></div>
            <div class="novel-actions">
              <button class="btn-primary" id="startReadBtn">开始阅读</button>
              <button class="btn-outline" id="shelfBtn" type="button">加入书架</button>
              <a target="_blank" rel="noopener" class="btn-outline" id="originLink">原站查看</a>
            </div>
          </div>
        </div>

        <div class="synopsis-box">
          <h2 class="section-title">📋 简介</h2>
          <div class="synopsis-text" id="synopsisText"></div>
        </div>

        <div class="chapter-section">
          <h2 class="section-title">📚 章节列表</h2>
          <div class="chapter-list-wrap">
            <div class="loading" id="chapterLoading">
              <div class="spinner"></div>
              <p>正在加载章节…</p>
            </div>
            <div id="chapterError" class="empty" style="display:none">
              <p>章节加载失败，可先通过“原站查看”继续阅读</p>
            </div>
            <div id="chapterContent"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>内容来源：<a href="https://syosetu.com" target="_blank" rel="noopener">小説家になろう</a>（合法公开平台）</p>
      <p>本站仅供日语学习与交流，版权归原作者所有</p>
    </div>
  </footer>

  <script src="static/js/app.js"></script>
  <script src="static/js/common.js"></script>
  <script src="static/js/novel-page.js"></script>
</body>
</html>
